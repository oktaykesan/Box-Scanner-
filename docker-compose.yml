services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: boxscan-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - backend/.env
    volumes:
      # Veritabanı ve görseller kalıcı olarak dışarıda saklanır
      - ./backend/boxscan.db:/app/backend/boxscan.db
      - ./backend/uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
